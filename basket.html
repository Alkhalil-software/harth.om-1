    <style>
      .filters-bar {
        max-width: 1100px;
        margin: 20px auto;
        padding: 14px 18px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .filters-bar input,
      .filters-bar select {
        padding: 8px 12px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        background: #ffffff;
        color: #1a1a1a;
        font-family: inherit;
        appearance: auto;
        -webkit-appearance: auto;
      }
      .filters-bar select option {
        background: #ffffff;
        color: #1a1a1a;
      }
      .filters-bar select option:checked {
        background: #e8f5e0;
        color: #1a1a1a;
      }
      .filters-bar input[type="search"] {
        flex: 1;
        min-width: 200px;
      }
      #load-state {
        text-align: center;
        padding: 40px;
        font-size: 18px;
      }
      .loading-spinner {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: #6ab04c;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .empty-state {
        text-align: center;
        padding: 40px;
        color: rgba(255, 255, 255, 0.9);
      }
      .empty-state i {
        font-size: 52px;
        color: #6ab04c;
        margin-bottom: 12px;
      }

      .pagination-bar {
        display: flex;
        gap: 8px;
        justify-content: center;
        padding: 20px;
        flex-wrap: wrap;
      }
      .pagination-bar button {
        padding: 6px 14px;
        border: 1px solid #6ab04c;
        background: rgba(255, 255, 255, 0.9);
        color: #2d5016;
        border-radius: 6px;
        cursor: pointer;
        font-family: inherit;
      }
      .pagination-bar button.active {
        background: #6ab04c;
        color: #fff;
      }
      .pagination-bar button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .stock-chip {
        display: inline-block;
        background: rgba(106, 176, 76, 0.25);
        color: #d4edda;
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 999px;
      }
      .stock-chip.low {
        background: rgba(241, 196, 15, 0.25);
        color: #ffeaa7;
      }
      .stock-chip.out {
        background: rgba(231, 76, 60, 0.25);
        color: #ffb3b3;
      }

      .wishlist-btn {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.35);
        color: #fff;
        padding: 8px 10px;
        border-radius: 50%;
        cursor: pointer;
        transition: all 0.2s;
      }
      .wishlist-btn.active {
        background: #e74c3c;
        color: #fff;
        border-color: #e74c3c;
      }

      #toast {
        position: fixed;
        bottom: 24px;
        inset-inline-start: 50%;
        transform: translateX(-50%);
        background: #2d5016;
        color: #fff;
        padding: 12px 22px;
        border-radius: 8px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        z-index: 2000;
        opacity: 0;
        transition: opacity 0.25s;
        pointer-events: none;
        max-width: 90vw;
      }
      #toast.show {
        opacity: 1;
      }
      #toast.error {
        background: #c0392b;
      }

      .cart-badge {
        position: absolute;
        top: -6px;
        inset-inline-start: -6px;
        background: #e74c3c;
        color: #fff;
        font-size: 12px;
        padding: 2px 7px;
        border-radius: 999px;
        font-weight: 700;
      }
      .basket-floating-button {
        position: fixed;
      }

    <script>
      // =================================================================
      // basket.html — قائمة منتجات للبيع من API + إضافة للسلة عبر API
      // =================================================================
      (function () {
        "use strict";

        const PAGE_SIZE = 12;
        let currentPage = 1;
        let wishlistCache = new Set(); // equipment_ids currently wishlisted
        let favoritesOnly = false; // toggled by the heart filter button
        const PAGE_LISTING_TYPE = "sale"; // basket = sale; tools.html overrides via constant below

        const $ = (s) => document.querySelector(s);

        function showToast(msg, isError = false) {
          const t = $("#toast");
          t.textContent = msg;
          t.classList.toggle("error", isError);
          t.classList.add("show");
          setTimeout(() => t.classList.remove("show"), 3200);
        }

        function escapeHtml(s) {
          if (s == null) return "";
          return String(s).replace(/[&<>"']/g, (c) => ({
            "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
          })[c]);
        }

        function categoryLabel(c) {
          return ({
            tractor: "جرار", sprayer: "مرشة", harvester: "حصادة",
            tools: "أدوات", seeds: "بذور", fertilizer: "أسمدة",
            pesticide: "مبيدات", other: "أخرى",
          })[c] || c;
        }

        async function loadProducts() {
          $("#load-state").style.display = "block";
          $("#product-grid").style.display = "none";
          $("#empty-state").style.display = "none";
          $("#pagination").innerHTML = "";

          const cat = $("#filter-category").value;
          const gov = $("#filter-governorate") ? $("#filter-governorate").value : "";
          const search = $("#filter-search").value.trim();

          // ─── Favorites mode: hit /wishlist instead of /equipment ───
          // The wishlist endpoint joins equipment for us and supports the
          // same search/category filters. Governorate filter doesn't apply
          // (we don't filter favorites by location — they're already curated)
          // and sort is preserved client-side via stable backend ordering.
          if (favoritesOnly) {
            if (!getToken || !getToken()) {
              // Anonymous user clicked "favorites only" — show a polite hint.
              showFavoritesNeedLogin();
              return;
            }

            const params = new URLSearchParams({
              page: String(currentPage),
              limit: String(PAGE_SIZE),
              listing_type: PAGE_LISTING_TYPE,
            });
            if (cat) params.set("category", cat);
            if (search) params.set("search", search);

            try {
              const res = await apiFetch(`/wishlist?${params}`);
              if (!res || !res.success) {
                throw new Error((res && res.error && res.error.message) || "Failed to load");
              }
              // The wishlist endpoint shapes rows with both equipment_id and
              // id (the equipment id), so renderGrid keeps working unchanged.
              // Preload the wishlist cache — every shown item IS wishlisted.
              wishlistCache = new Set(res.items.map((i) => i.id));
              renderGrid(res.items);
              renderPagination(res.pagination);
            } catch (err) {
              $("#load-state").innerHTML = `<p style="color:#ffb3b3">خطأ: ${escapeHtml(err.message)}</p>`;
              showToast(err.message || "خطأ في التحميل", true);
            }
            return;
          }

          // ─── Normal mode: full equipment catalog ───
          const params = new URLSearchParams({
            listing_type: PAGE_LISTING_TYPE,
            page: String(currentPage),
            limit: String(PAGE_SIZE),
            sort: $("#filter-sort").value,
          });
          if (cat) params.set("category", cat);
          if (gov) params.set("governorate", gov);
          if (search) params.set("search", search);

          try {
            const res = await apiFetch(`/equipment?${params}`);
            if (!res || !res.success) {
              throw new Error((res && res.error && res.error.message) || "Failed to load");
            }

            // Load wishlist cache for highlighting hearts (authenticated users only)
            if (getToken && getToken() && res.items.length) {
              try {
                const ids = res.items.map((i) => i.id);
                const checks = await Promise.all(
                  ids.map((id) =>
                    apiFetch(`/wishlist/check/${id}`).then((r) => ({ id, yes: r && r.wishlisted })),
                  ),
                );
                wishlistCache = new Set(checks.filter((c) => c.yes).map((c) => c.id));
              } catch (_e) {
                wishlistCache = new Set();
              }
            }

            renderGrid(res.items);
            renderPagination(res.pagination);
          } catch (err) {
            $("#load-state").innerHTML = `<p style="color:#ffb3b3">خطأ: ${escapeHtml(err.message)}</p>`;
            showToast(err.message || "خطأ في التحميل", true);
          }
        }

        function showFavoritesNeedLogin() {
          $("#load-state").style.display = "none";
          $("#product-grid").style.display = "none";
          $("#empty-state").style.display = "block";
          $("#empty-state").innerHTML = `
            <i class="far fa-heart" style="font-size:64px;color:#6ab04c;display:block;margin-bottom:12px"></i>
            <h3>سجّل دخول لرؤية مفضلتك</h3>
            <p style="margin-top:8px"><a href="register.html" style="color:#6ab04c">تسجيل الدخول</a></p>
          `;
        }

        function renderGrid(items) {
          $("#load-state").style.display = "none";
          const grid = $("#product-grid");
          grid.innerHTML = "";
          if (!items.length) {
            $("#empty-state").style.display = "block";
            return;
          }

          for (const eq of items) {
            const img = eq.primary_image_url || (Array.isArray(eq.images) && eq.images[0]) || "";
            const stock = Number(eq.stock || 0);
            const stockCls = stock <= 0 ? "out" : stock <= 3 ? "low" : "";
            const stockText = stock <= 0 ? "نفذ المخزون" : stock <= 3 ? `بقي ${stock}` : `${stock} متوفر`;
            const isWish = wishlistCache.has(eq.id);

            const card = document.createElement("div");
            card.className = "product-card";
            card.innerHTML = `
              ${img
                ? `<img src="${escapeHtml(img)}" alt="${escapeHtml(eq.name)}" class="product-img" />`
                : `<div class="product-img" style="background:#333;display:flex;align-items:center;justify-content:center"><i class="fas fa-box" style="font-size:48px;color:#888"></i></div>`}
              <div class="product-info">
                <h3>${escapeHtml(eq.name)}</h3>
                <p style="font-size:13px;color:#ddd;margin:6px 0">
                  ${escapeHtml((eq.description || "").slice(0, 100))}${(eq.description || "").length > 100 ? "..." : ""}
                </p>
                <div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0">
                  <span class="stock-chip ${stockCls}">${stockText}</span>
                  <span style="font-size:13px;color:#f1c40f">
                    <i class="fas fa-star"></i> ${Number(eq.avg_rating || 0).toFixed(1)}
                  </span>
                </div>
                <div style="font-size:13px;color:#bbb;margin-bottom:6px">
                  التصنيف: ${escapeHtml(categoryLabel(eq.category))}
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
                  <span style="font-size:22px;font-weight:700;color:#6ab04c">
                    ${escapeHtml(String(eq.sale_price))} ر.ع
                  </span>
                </div>
                <div style="display:flex;gap:8px;margin-top:12px;align-items:center;flex-wrap:wrap">
                  <button class="btn-order add-cart-btn" data-id="${eq.id}" ${stock <= 0 ? "disabled" : ""}>
                    <i class="fas fa-cart-plus"></i> أضف للسلة
                  </button>
                  <button class="wishlist-btn ${isWish ? "active" : ""}" data-id="${eq.id}" title="المفضلة">
                    <i class="fa${isWish ? "s" : "r"} fa-heart"></i>
                  </button>
                  <button class="pdf-btn" title="الملف الفني PDF" style="background:linear-gradient(135deg,#8e44ad,#9b59b6);color:#fff;border:none;padding:8px 12px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit">
                    <i class="fas fa-file-pdf"></i> الملف الفني
                  </button>
                </div>
              </div>
            `;
            grid.appendChild(card);

            const addBtn = card.querySelector(".add-cart-btn");
            const wishBtn = card.querySelector(".wishlist-btn");
            const pdfBtn = card.querySelector(".pdf-btn");
            if (addBtn) addBtn.addEventListener("click", () => addToCartApi(eq.id));
            if (wishBtn) wishBtn.addEventListener("click", () => toggleWishlist(eq.id, wishBtn));
            if (pdfBtn) pdfBtn.addEventListener("click", () => { if (window.generateEquipmentPDF) generateEquipmentPDF(eq); });
          }

          grid.style.display = "grid";
        }

        function renderPagination(p) {
          const wrap = $("#pagination");
          wrap.innerHTML = "";
          if (!p || p.pages <= 1) return;
          const mk = (label, page, opts = {}) => {
            const b = document.createElement("button");
            b.textContent = label;
            if (opts.active) b.classList.add("active");
            if (opts.disabled) b.disabled = true;
            b.addEventListener("click", () => {
              currentPage = page;
              loadProducts();
              window.scrollTo({ top: 0, behavior: "smooth" });
            });
            return b;
          };
          wrap.appendChild(mk("السابق", Math.max(1, p.page - 1), { disabled: p.page === 1 }));
          for (let i = 1; i <= p.pages; i++) {
            wrap.appendChild(mk(String(i), i, { active: i === p.page }));
          }
          wrap.appendChild(mk("التالي", Math.min(p.pages, p.page + 1), { disabled: p.page === p.pages }));
        }

        async function addToCartApi(equipmentId) {
          if (!getToken || !getToken()) {
            showToast("يجب تسجيل الدخول أولاً", true);
            setTimeout(() => (window.location.href = "register.html"), 1200);
            return;
          }
          try {
            const res = await apiFetch("/cart/items", {
              method: "POST",
              body: JSON.stringify({ equipment_id: equipmentId, quantity: 1 }),
            });
            if (!res || !res.success) {
              throw new Error((res && res.error && res.error.message) || "فشل الإضافة");
            }
            showToast("✓ تمت إضافة المنتج للسلة");
            updateCartBadge();
          } catch (err) {
            showToast(err.message || "فشل الإضافة", true);
          }
        }

        async function toggleWishlist(equipmentId, btn) {
          if (!getToken || !getToken()) {
            showToast("سجّل دخولك لحفظ المفضلة", true);
            return;
          }
          const isActive = btn.classList.contains("active");
          try {
            if (isActive) {
              const res = await apiFetch(`/wishlist/${equipmentId}`, { method: "DELETE" });
              if (!res || !res.success) throw new Error((res && res.error && res.error.message) || "فشل");
              btn.classList.remove("active");
              btn.querySelector("i").className = "far fa-heart";
              wishlistCache.delete(equipmentId);
              showToast("أُزيلت من المفضلة");

              // If we're showing favorites only, the row needs to disappear.
              if (favoritesOnly) loadProducts();
            } else {
              const res = await apiFetch("/wishlist", {
                method: "POST",
                body: JSON.stringify({ equipment_id: equipmentId }),
              });
              if (!res || !res.success) throw new Error((res && res.error && res.error.message) || "فشل");
              btn.classList.add("active");
              btn.querySelector("i").className = "fas fa-heart";
              wishlistCache.add(equipmentId);
              showToast("✓ أُضيفت للمفضلة");
            }
          } catch (err) {
            showToast(err.message || "خطأ", true);
          }
        }

        async function updateCartBadge() {
          if (!getToken || !getToken()) {
            $("#cart-badge").style.display = "none";
            return;
          }
          try {
            const res = await apiFetch("/cart");
            if (res && res.success) {
              const count = (res.items || []).reduce((s, i) => s + Number(i.quantity), 0);
              const badge = $("#cart-badge");
              if (count > 0) {
                badge.textContent = count;
                badge.style.display = "inline-block";
              } else {
                badge.style.display = "none";
              }
            }
          } catch (_e) {
            // silent
          }
        }

        document.addEventListener("DOMContentLoaded", () => {
          loadProducts();
          updateCartBadge();

          let searchDebounce;
          $("#filter-search").addEventListener("input", () => {
            clearTimeout(searchDebounce);
            searchDebounce = setTimeout(() => {
              currentPage = 1;
              loadProducts();
            }, 350);
          });
          $("#filter-governorate").addEventListener("change", () => { currentPage = 1; loadProducts(); });
          $("#filter-category").addEventListener("change", () => {
            currentPage = 1;
            loadProducts();
          });
          $("#filter-sort").addEventListener("change", () => {
            currentPage = 1;
            loadProducts();
          });

          // Favorites filter toggle — switches the source from /equipment
          // to /wishlist. Clicking flips the visual state too.
          const favBtn = $("#filter-favorites-toggle");
          if (favBtn) {
            favBtn.addEventListener("click", () => {
              favoritesOnly = !favoritesOnly;
              favBtn.setAttribute("aria-pressed", String(favoritesOnly));
              favBtn.querySelector("i").className = favoritesOnly
                ? "fas fa-heart"
                : "far fa-heart";
              favBtn.style.background = favoritesOnly
                ? "rgba(231, 76, 60, 0.2)"
                : "transparent";
              favBtn.style.borderColor = favoritesOnly
                ? "#e74c3c"
                : "rgba(255,255,255,0.2)";
              favBtn.style.color = favoritesOnly ? "#ffb3b3" : "#fff";

              // Governorate + sort filters don't apply in favorites mode.
              const govSel = $("#filter-governorate");
              const sortSel = $("#filter-sort");
              if (govSel) govSel.disabled = favoritesOnly;
              if (sortSel) sortSel.disabled = favoritesOnly;

              currentPage = 1;
              loadProducts();
            });
          }
        });
      })();
    </script>
  
    <!-- HARTH-RESPONSIVE-JS -->
    <script src="responsive.js" defer></script>
  </body>
</html>
